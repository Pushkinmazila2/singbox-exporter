services:
  singbox-exporter:
    build: .
    container_name: singbox-exporter
    restart: unless-stopped
    network_mode: host
    environment:
      - CLASH_API_URL=${CLASH_API_URL:-http://127.0.0.1:9090}
      - CLASH_API_SECRET=${CLASH_API_SECRET}
      - EXPORTER_PORT=9101
      - SCRAPE_INTERVAL=15
