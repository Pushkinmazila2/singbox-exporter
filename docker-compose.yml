services:
  singbox-exporter:
    build: .
    container_name: singbox-exporter
    restart: unless-stopped
    environment:
      - CLASH_API_URL=${CLASH_API_URL:-http://127.0.0.1:9090}
      - CLASH_API_SECRET=${CLASH_API_SECRET}
      - EXPORTER_PORT=${EXPORTER_PORT:-9091}
      - SCRAPE_INTERVAL=15
    ports:
      - "127.0.0.1:${EXPORTER_PORT:-9091}:${EXPORTER_PORT:-9091}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:$$EXPORTER_PORT/metrics | grep '^singbox_info '"]
      interval: 10s
      timeout: 5s
      retries: 3
